name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate event definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate

  build-typescript:
    name: Build TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @eventgen/core build
      - run: pnpm --filter @eventgen/runtime-typescript build
      - run: pnpm --filter @eventgen/generator-typescript build
      - run: pnpm --filter @eventgen/generator-java build
      - run: pnpm --filter @eventgen/generator-python build
      - run: pnpm --filter @eventgen/generator-go build
      - run: pnpm generate:ts
      - run: pnpm generate:java
      - run: pnpm generate:python
      - run: pnpm generate:go

  build-web:
    name: Build web catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web

  build-python:
    name: Build Python runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install hatchling
      - run: python -m hatchling build
        working-directory: packages/runtime-python

  build-java:
    name: Build Java runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn --no-transfer-progress clean package -DskipTests
        working-directory: packages/runtime-java

  build-go:
    name: Build Go runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: packages/runtime-go/go.sum
      - run: go test ./...
        working-directory: packages/runtime-go

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: [build-typescript, build-java, build-python, build-go]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: packages/runtime-go/go.sum
      - run: pnpm install --frozen-lockfile
      - name: Build packages before testing
        run: |
          pnpm --filter @eventgen/core build
          pnpm --filter @eventgen/runtime-typescript build
          pnpm --filter @eventgen/generator-typescript build
          pnpm --filter @eventgen/generator-java build
          pnpm --filter @eventgen/generator-python build
          pnpm --filter @eventgen/generator-go build
      - name: Run all tests
        run: pnpm test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/*/test-results/junit.xml
          retention-days: 30
