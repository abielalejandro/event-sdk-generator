name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish Python runtime to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for PyPI Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml
        working-directory: packages/runtime-python

      - name: Build wheel and sdist
        run: python -m build
        working-directory: packages/runtime-python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/runtime-python/dist/
          # Uses OIDC Trusted Publishing — no token needed if configured in PyPI
          # Alternatively, set: password: ${{ secrets.PYPI_TOKEN }}
