name: Publish to Maven (GitHub Packages)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish Java runtime to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in pom.xml
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} --no-transfer-progress
        working-directory: packages/runtime-java

      - name: Build
        run: mvn --no-transfer-progress clean package -DskipTests
        working-directory: packages/runtime-java

      - name: Publish to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests
        working-directory: packages/runtime-java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
