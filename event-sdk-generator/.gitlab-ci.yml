stages:
  - validate
  - build
  - publish
  - release

variables:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.11"

# ─── Anchors ────────────────────────────────────────────────────────────────

.pnpm: &pnpm
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g pnpm@${PNPM_VERSION}
    - pnpm install --frozen-lockfile

.only-mr-and-master: &only-mr-and-master
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

.only-tag: &only-tag
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ─── VALIDATE ────────────────────────────────────────────────────────────────

validate:definitions:
  <<: [*pnpm, *only-mr-and-master]
  stage: validate
  script:
    - pnpm validate

# ─── BUILD ────────────────────────────────────────────────────────────────────

build:typescript:
  <<: [*pnpm, *only-mr-and-master]
  stage: build
  script:
    - pnpm --filter @eventgen/core build
    - pnpm --filter @eventgen/runtime-typescript build
    - pnpm --filter @eventgen/generator-typescript build
    - pnpm --filter @eventgen/generator-java build
    - pnpm --filter @eventgen/generator-python build
    - pnpm generate:ts
    - pnpm generate:java
    - pnpm generate:python
  artifacts:
    paths:
      - packages/*/dist/
    expire_in: 1 hour

build:web:
  <<: [*pnpm, *only-mr-and-master]
  stage: build
  script:
    - pnpm build:web
  artifacts:
    paths:
      - apps/web-catalog/.next/
    expire_in: 1 hour

build:java:
  <<: *only-mr-and-master
  stage: build
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  script:
    - mvn --no-transfer-progress clean package -DskipTests
  working_directory: packages/runtime-java
  artifacts:
    paths:
      - packages/runtime-java/target/*.jar
    expire_in: 1 hour

build:python:
  <<: *only-mr-and-master
  stage: build
  image: python:${PYTHON_VERSION}
  script:
    - pip install --quiet hatchling build
    - python -m build
  working_directory: packages/runtime-python
  artifacts:
    paths:
      - packages/runtime-python/dist/
    expire_in: 1 hour

# ─── PUBLISH ─────────────────────────────────────────────────────────────────

publish:npm:
  <<: *only-tag
  stage: publish
  image: node:${NODE_VERSION}
  before_script:
    - npm install -g pnpm@${PNPM_VERSION}
    - pnpm install --frozen-lockfile
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - |
      for pkg in core runtime-typescript generator-typescript generator-java generator-python cli; do
        echo "▶ Building @eventgen/$pkg"
        pnpm --filter @eventgen/$pkg build
        echo "▶ Publishing @eventgen/$pkg"
        pnpm --filter @eventgen/$pkg publish --access public --no-git-checks
      done
  environment:
    name: npm

publish:maven:
  <<: *only-tag
  stage: publish
  image: maven:3.9-eclipse-temurin-${JAVA_VERSION}
  variables:
    MAVEN_REPO_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/maven"
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - mvn versions:set -DnewVersion=$VERSION --no-transfer-progress -f packages/runtime-java/pom.xml
    - |
      mvn deploy --no-transfer-progress -DskipTests \
        -f packages/runtime-java/pom.xml \
        -s .gitlab/maven-settings.xml \
        -DaltDeploymentRepository=gitlab-maven::default::${MAVEN_REPO_URL}
  environment:
    name: gitlab-packages/maven

publish:pypi:
  <<: *only-tag
  stage: publish
  image: python:${PYTHON_VERSION}
  script:
    - pip install --quiet hatchling build twine
    - VERSION=${CI_COMMIT_TAG#v}
    - sed -i "s/^version = .*/version = \"${VERSION}\"/" packages/runtime-python/pyproject.toml
    - python -m build --outdir packages/runtime-python/dist/ packages/runtime-python/
    - >
      twine upload packages/runtime-python/dist/*
      --username __token__
      --password ${PYPI_TOKEN}
      --non-interactive
  environment:
    name: pypi

# ─── RELEASE ─────────────────────────────────────────────────────────────────

release:create:
  <<: *only-tag
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - publish:npm
    - publish:maven
    - publish:pypi
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: |
      ## What's included

      | Package | Registry |
      |---------|----------|
      | `@eventgen/*` | [npm](https://www.npmjs.com/org/eventgen) |
      | `com.eventgen:runtime-java` | GitLab Package Registry |
      | `eventgen-runtime-python` | [PyPI](https://pypi.org/project/eventgen-runtime-python) |

# ─── RELEASE MANUAL (version bump + tag) ────────────────────────────────────

.release-manual-base:
  stage: release
  image: node:${NODE_VERSION}
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual

bump-version:
  extends: .release-manual-base
  variables:
    RELEASE_VERSION: ""   # Set this variable when triggering manually
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - git config user.name "gitlab-ci-bot"
    - git config user.email "gitlab-ci-bot@noreply.gitlab.com"
    - git remote set-url origin "https://gitlab-ci-token:${CI_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      if [ -z "$RELEASE_VERSION" ]; then
        echo "ERROR: RELEASE_VERSION variable is required (e.g. 1.0.0)"
        exit 1
      fi
    - npm install -g pnpm@${PNPM_VERSION}
    - pnpm install --frozen-lockfile
    - |
      for pkg in core runtime-typescript generator-typescript generator-java generator-python cli; do
        node -e "
          const f = 'packages/$pkg/package.json';
          const p = JSON.parse(require('fs').readFileSync(f));
          p.version = '${RELEASE_VERSION}';
          require('fs').writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
        "
      done
    - sed -i "s/^version = .*/version = \"${RELEASE_VERSION}\"/" packages/runtime-python/pyproject.toml
    - |
      mvn_pom=packages/runtime-java/pom.xml
      sed -i "0,/<version>.*<\/version>/s/<version>.*<\/version>/<version>${RELEASE_VERSION}<\/version>/" $mvn_pom
    - git add packages/*/package.json packages/runtime-python/pyproject.toml packages/runtime-java/pom.xml
    - git commit -m "chore: bump version to ${RELEASE_VERSION}"
    - git tag v${RELEASE_VERSION}
    - git push origin master
    - git push origin v${RELEASE_VERSION}
