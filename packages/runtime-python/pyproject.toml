[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "eventgen-runtime-python"
version = "0.1.0"
description = "Runtime adapters for eventgen generated Python SDKs"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
aws     = ["aioboto3>=13.0"]
gcp     = ["google-cloud-pubsub>=2.0"]
azure   = ["azure-servicebus>=7.0"]
kafka   = ["aiokafka>=0.10"]
rabbitmq = ["aio-pika>=9.0"]
all     = [
  "aioboto3>=13.0",
  "google-cloud-pubsub>=2.0",
  "azure-servicebus>=7.0",
  "aiokafka>=0.10",
  "aio-pika>=9.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/eventgen_runtime"]
